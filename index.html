<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noite de Yalda</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css" />
  <style>
    :root {
      --accent: #e8c97a;
    }

    .reveal h1, .reveal h2 {
      text-transform: none;
      font-weight: 700;
    }

    .reveal .slides section {
      text-align: center;
      padding: 0 20px;
    }

    /* Title slide */
    .title-slide {
      background: #0d1b2a;
    }
    .title-slide h1 {
      font-size: 2.4em;
      color: var(--accent);
      margin-bottom: 0.3em;
    }
    .title-slide p {
      color: #aaa;
      font-size: 0.9em;
      letter-spacing: 0.08em;
    }

    /* Image slides */
    .img-slide h2 {
      font-size: 1em;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5em;
    }

    .img-slide img {
      width: 100%;
      height: 310px;
      object-fit: cover;
      border-radius: 10px;
      display: block;
    }

    .keywords {
      margin-top: 0.6em;
      display: flex;
      justify-content: center;
      gap: 1.2em;
      flex-wrap: wrap;
    }

    .keywords span {
      font-size: 1.1em;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
    }

    .keywords span + span::before {
      content: "·";
      margin-right: 1.2em;
      color: var(--accent);
    }

    /* Closing slide */
    .closing-slide {
      background: #0d1b2a;
    }
    .closing-slide h1 {
      font-size: 2.2em;
      color: var(--accent);
    }
    .closing-slide p {
      color: #aaa;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">

      <!-- Slide 1: Title -->
      <section class="title-slide">
        <h1>🌙 Noite de Yalda</h1>
        <p>Uma festa persa</p>
      </section>

      <!-- Slide 2: Date -->
      <section class="img-slide">
        <h2>Quando?</h2>
        <img src="images/1.jpeg" alt="Noite de Yalda" />
        <div class="keywords">
          <span>21 de dezembro</span>
          <span>noite mais longa</span>
        </div>
      </section>

      <!-- Slide 3: Family -->
      <section class="img-slide">
        <h2>Família</h2>
        <img src="images/1.jpeg" alt="Família junta" />
        <div class="keywords">
          <span>família junta</span>
          <span>celebração</span>
        </div>
      </section>

      <!-- Slide 4: Hafez -->
      <section class="img-slide">
        <h2>Tradição</h2>
        <img src="images/3.jpeg" alt="Poesia de Hafez" />
        <div class="keywords">
          <span>poesia de Hafez</span>
          <span>prevê o futuro</span>
        </div>
      </section>

      <!-- Slide 5: Special table -->
      <section class="img-slide">
        <h2>Mesa especial</h2>
        <img src="images/2.jpeg" alt="Mesa de Yalda" />
        <div class="keywords">
          <span>melancia</span>
          <span>romã</span>
          <span>frutos secos</span>
        </div>
      </section>

      <!-- Slide 6: Closing -->
      <section class="closing-slide">
        <h1>Obrigado! 🌙</h1>
        <p>Yalda Mobārak</p>
      </section>

    </div>
  </div>

  <script src="./reveal.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      slideNumber: true,
      transition: 'fade',
      transitionSpeed: 'default',
    });
  </script>
</body>
</html>
